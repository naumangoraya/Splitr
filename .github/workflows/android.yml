name: Build Android APK

# Builds an installable APK on GitHub's free runners — no Android Studio needed.
# Run it from the repo's "Actions" tab (Build Android APK -> Run workflow),
# then download the "splitr-apk" artifact at the bottom of the run.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   VITE_SUPABASE_URL        your Supabase project URL
#   VITE_SUPABASE_ANON_KEY   your Supabase anon public key
# Optional (only for FCM background push):
#   GOOGLE_SERVICES_JSON     base64 of android/app/google-services.json
#                            (run: base64 -w0 google-services.json) — without it
#                            the app still builds, just no background push.
# Optional (only for a signed Play Store bundle — see the `release` job below):
#   ANDROID_KEYSTORE_BASE64    base64 of your release keystore
#   ANDROID_KEYSTORE_PASSWORD  the keystore (store) password
#   ANDROID_KEY_ALIAS          the key alias inside the keystore
#   ANDROID_KEY_PASSWORD       the key password
#                            Without these, the release job is skipped and only
#                            the debug APK is built.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # map the optional secret to an env var so steps can check it in `if`
    # (GitHub Actions doesn't allow the `secrets` context inside `if:`)
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web app (bakes in Supabase keys)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build tools
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Add google-services.json (only if the secret is set → enables FCM push)
        if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: splitr-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # Signed Android App Bundle (.aab) for the Google Play Store.
  # Runs only when the ANDROID_KEYSTORE_BASE64 secret is present; otherwise every
  # step is skipped and the job ends green (so the debug build above is unaffected).
  release:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}

      - name: Set up Node
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: npm install

      - name: Build web app (bakes in Supabase keys)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Set up Java 21
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build tools
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Add google-services.json (only if the secret is set → enables FCM push)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.GOOGLE_SERVICES_JSON != '' }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Sync web assets into the Android project
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: npx cap sync android

      - name: Decode keystore & write key.properties
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/splitr-release.keystore
          cat > android/key.properties <<EOF
          storeFile=splitr-release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build signed release bundle (.aab)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload AAB
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: splitr-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
